spring:
  application:
    name: ecommerce

  config:
    # Bắt buộc Spring Boot phải nạp file .env ở thư mục gốc trước
    import: optional:file:backend/.env[.properties]
    
  datasource:
    # Lúc này Spring đã hiểu các biến trong file .env
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

    
server:
  port: 8080